<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAI Guardian Proxy</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-family: 'Poppins', Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 255, 255, 0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0, 180, 255, 0.08), transparent 30%),
        linear-gradient(135deg, #06131a 0%, #0b1e27 50%, #081018 100%);
      padding: 24px;
    }

    .glass {
      backdrop-filter: blur(10px) saturate(180%);
      background-color: rgba(255, 255, 255, 0.04);
      border-radius: 36px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.25);
      text-align: center;
      border: 1px solid rgba(0, 255, 255, 0.5);
    }

    .theme-color {
      color: cyan !important;
      opacity: 0.95;
    }

    .circle1,
    .circle2,
    .circle3 {
      position: absolute;
      border-radius: 50%;
      opacity: 0.4;
      filter: blur(20px);
      z-index: -1;
    }

    .circle1 {
      width: 220px;
      height: 220px;
      background: #084d4d;
      top: 8%;
      right: 15%;
    }

    .circle2 {
      width: 170px;
      height: 170px;
      background: #245757;
      bottom: 18%;
      right: 10%;
    }

    .circle3 {
      width: 260px;
      height: 260px;
      background: #066969;
      bottom: 8%;
      left: 8%;
    }

    textarea {
      resize: none;
    }

    .response-box {
      min-height: 320px;
      max-height: 420px;
      overflow-y: auto;
      text-align: left;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .markdown-body {
      color: #f3f4f6;
      line-height: 1.7;
      word-break: break-word;
    }

    .markdown-body.blocked {
      color: #f87171;
    }

    .markdown-body.blocked p,
    .markdown-body.blocked li,
    .markdown-body.blocked strong,
    .markdown-body.blocked h1,
    .markdown-body.blocked h2,
    .markdown-body.blocked h3,
    .markdown-body.blocked h4,
    .markdown-body.blocked h5,
    .markdown-body.blocked h6 {
      color: #f87171 !important;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      color: cyan;
      font-weight: 700;
      margin-top: 1rem;
      margin-bottom: 0.75rem;
    }

    .markdown-body h1 { font-size: 1.6rem; }
    .markdown-body h2 { font-size: 1.4rem; }
    .markdown-body h3 { font-size: 1.2rem; }

    .markdown-body p {
      margin-bottom: 0.9rem;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin: 0.8rem 0 1rem 1.4rem;
    }

    .markdown-body li {
      margin-bottom: 0.45rem;
    }

    .markdown-body strong {
      color: #ffffff;
      font-weight: 700;
    }

    .markdown-body code {
      background: rgba(255, 255, 255, 0.08);
      padding: 0.15rem 0.35rem;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .markdown-body pre {
      background: rgba(0, 0, 0, 0.28);
      padding: 1rem;
      border-radius: 14px;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .status-pill {
      display: inline-block;
      min-height: 28px;
    }
  </style>
</head>

<body>
  <div class="glass flex flex-col md:flex-row gap-8 justify-between items-stretch w-full max-w-6xl">
    <div class="w-full md:w-1/2 text-center relative flex flex-col justify-center">
      <h1 class="text-3xl font-bold mb-3 drop-shadow theme-color">OpenAI Guardian Proxy</h1>

      <div class="relative w-full">
        <textarea
          id="promptInput"
          placeholder="Type your prompt here..."
          class="w-full min-h-[220px] px-4 py-4 text-lg rounded-2xl border border-cyan-400/30 bg-transparent text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-400 shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
        ></textarea>

        <button
          id="sendButton"
          class="h-12 mt-4 w-full px-6 py-2 bg-cyan-900 text-white font-semibold rounded-xl transition duration-200 opacity-50 cursor-not-allowed disabled:opacity-50 disabled:cursor-not-allowed"
          disabled
        >
          Send
        </button>

        <div id="status" class="status-pill mt-4 text-sm text-cyan-200"></div>
      </div>
    </div>

    <div class="w-full md:w-1/2 text-white flex flex-col">
      <div class="mb-3 text-left">
        <h2 class="text-xl font-semibold theme-color">Response</h2>
      </div>

      <div class="response-box p-6">
        <div id="responseOutput" class="markdown-body text-gray-200">
          <p class="text-gray-400 italic">No response yet.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="circle3"></div>

  <script>
    anime({
      targets: '.circle1',
      keyframes: [
        { translateX: -80, translateY: 40, scale: 1.2, opacity: 0.55 },
        { translateX: 60, translateY: -40, scale: 1.0, opacity: 0.65 }
      ],
      direction: 'alternate',
      duration: 12000,
      easing: 'easeInOutSine',
      loop: true
    });

    anime({
      targets: '.circle2',
      keyframes: [
        { translateX: 50, translateY: -60, scale: 1.1, opacity: 0.7 },
        { translateX: -40, translateY: 70, scale: 0.9, opacity: 0.6 }
      ],
      direction: 'alternate',
      duration: 13500,
      easing: 'easeInOutSine',
      loop: true
    });

    anime({
      targets: '.circle3',
      keyframes: [
        { translateX: -60, translateY: 100, scale: 1.3, opacity: 0.45 },
        { translateX: 80, translateY: -80, scale: 1.0, opacity: 0.45 }
      ],
      direction: 'alternate',
      duration: 18000,
      easing: 'easeInOutSine',
      loop: true
    });
  </script>

  <script>
    const promptInput = document.getElementById("promptInput");
    const sendButton = document.getElementById("sendButton");
    const responseOutput = document.getElementById("responseOutput");
    const statusEl = document.getElementById("status");

    function updateButtonState() {
      if (promptInput.disabled) {
        sendButton.disabled = true;
        sendButton.classList.add("opacity-50", "cursor-not-allowed");
        sendButton.classList.remove("hover:bg-cyan-800");
        return;
      }

      if (promptInput.value.trim()) {
        sendButton.disabled = false;
        sendButton.classList.remove("opacity-50", "cursor-not-allowed");
        sendButton.classList.add("hover:bg-cyan-800");
      } else {
        sendButton.disabled = true;
        sendButton.classList.add("opacity-50", "cursor-not-allowed");
        sendButton.classList.remove("hover:bg-cyan-800");
      }
    }

    function setLoadingState(isLoading) {
      promptInput.disabled = isLoading;
      sendButton.disabled = isLoading || !promptInput.value.trim();

      if (isLoading) {
        sendButton.classList.add("opacity-50", "cursor-not-allowed");
        sendButton.classList.remove("hover:bg-cyan-800");
      } else {
        updateButtonState();
      }
    }

    function renderResponse(text, isBlocked = false) {
      responseOutput.classList.remove("blocked");
      responseOutput.innerHTML = marked.parse(text || "");

      if (isBlocked) {
        responseOutput.classList.add("blocked");
      }
    }

    async function sendPrompt() {
      const prompt = promptInput.value.trim();

      if (!prompt) {
        statusEl.textContent = "Please enter a prompt.";
        return;
      }

      renderResponse("Thinking...");
      setLoadingState(true);

      try {
        const res = await fetch("http://localhost:8001/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        const responseText = data.response || data.detail || "Request failed.";
        const isBlocked = typeof responseText === "string" &&
          responseText.toLowerCase().includes("the prompt was blocked because");

        renderResponse(responseText, isBlocked);
        statusEl.textContent = "";
      } catch (error) {
        responseOutput.classList.remove("blocked");
        responseOutput.textContent = "Could not connect to backend.";
        statusEl.textContent = "Connection error";
      } finally {
        setLoadingState(false);
      }
    }

    promptInput.addEventListener("input", updateButtonState);

    sendButton.addEventListener("click", sendPrompt);

    updateButtonState();
  </script>
</body>
</html>
