services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openai_guardian_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - openai_guardian_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openai_guardian_backend
    ports:
      - "8001:8000"
    networks:
      - openai_guardian_network
    environment:
      NGINX_BASE_URL: https://nginx
      NGINX_CA_CERT: /app/certs/server.crt
    volumes:
      - ./nginx/certs/server.crt:/app/certs/server.crt:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: openai_guardian_nginx
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./nginx/certs/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      - backend
    networks:
      - openai_guardian_network

  mitmproxy:
    build:
      context: ./mitmproxy
      dockerfile: Dockerfile
    container_name: openai_guardian_mitmproxy
    expose:
      - "8080"
    environment:
      GUARDIAN_URL: ${GUARDIAN_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command:
      [
        "mitmdump",
        "--mode", "reverse:http://backend:8000",
        "--listen-host", "0.0.0.0",
        "--listen-port", "8080",
        "-s", "/app/addon.py"
      ]
    networks:
      - openai_guardian_network

networks:
  openai_guardian_network:
    driver: bridge